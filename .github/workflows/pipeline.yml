name: Local CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t naveen266/devops-app:${{ github.run_number }} .
          docker push naveen266/devops-app:${{ github.run_number }}

      # - name: Terraform Apply
      #   working-directory: infra
      #   run: terraform apply -auto-approve -var="image_tag=${{ github.run_number }}"

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve -var="image_tag=${{ github.run_number }}"

      # 1️⃣ Wait until deployment is ready
      - name: Wait for Deployment
        run: kubectl rollout status deployment/devops-app

      # 2️⃣ Now check pods (optional debug)
      - name: Verify Pods
        run: kubectl get pods -o wide

      # 3️⃣ Test service internally
      - name: Test Service Internally
        run: kubectl run curl-test --rm -i --tty --image=curlimages/curl --restart=Never -- curl http://devops-servicetp://devops-service
