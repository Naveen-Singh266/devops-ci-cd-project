name: Local CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t naveen266/devops-app:${{ github.run_number }} .
          docker push naveen266/devops-app:${{ github.run_number }}

      # - name: Terraform Apply
      #   working-directory: infra
      #   run: terraform apply -auto-approve -var="image_tag=${{ github.run_number }}"

      - name: Terraform Init
        run: cd infra && terraform init

      - name: Terraform Apply
        run: cd infra && terraform apply -auto-approve

      - name: Verify Deployment
        run: kubectl get pods
        
      - name: Port-forward in background
        shell: powershell
        run: |
          Start-Process -NoNewWindow -FilePath "kubectl" -ArgumentList "port-forward service/devops-service 9090:80"
          Start-Sleep -Seconds 5

      - name: Test Service with curl
        shell: powershell
        run: |
          curl http://localhost:9090/

      - name: Stop Port Forward
        shell: powershell
        run: |
          Get-Process kubectl | Stop-Process -Force
