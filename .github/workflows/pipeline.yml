name: Local CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t naveen266/devops-app:${{ github.run_number }} .
          docker push naveen266/devops-app:${{ github.run_number }}

      # - name: Terraform Apply
      #   working-directory: infra
      #   run: terraform apply -auto-approve -var="image_tag=${{ github.run_number }}"

      - name: Terraform Init
        run: cd infra && terraform init

      - name: Terraform Apply
        run: cd infra && terraform apply -auto-approve

      - name: Verify Deployment
        run: kubectl get pods
        
      - name: Port-forwarding for access on browser
        run: kubectl port-forward service/devops-service 9090:80

      - name: To access the URL by curl
        run: curl http://localhost:9090/
